services:
  - type: web
    name: cto-agent-monitor
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: PORT
        value: '10000'
      - key: GITHUB_PAT
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_SERVICE_IDS
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_ENDPOINT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VERCEL_API_TOKEN
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
